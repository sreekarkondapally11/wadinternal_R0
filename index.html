<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping Cart App</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body { margin: 0; background: #f4f4f4; }

    /* Layout */
    .container { max-width: 1100px; margin: auto; padding: 1rem; }
    header { background: #222; color: #fff; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
    header button { background: #fff; border: none; padding: 0.4rem 0.7rem; cursor: pointer; border-radius: 3px; font-weight: bold; }

    /* Forms */
    form { max-width: 400px; margin: 2rem auto; background: #fff; padding: 1.5rem; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    input { width: 100%; padding: 0.6rem; margin: 0.5rem 0; border: 1px solid #ccc; border-radius: 3px; }
    .error { color: red; font-size: 0.85rem; margin-bottom: 0.5rem; }

    /* Catalog */
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
    .card { background: #fff; padding: 1rem; border-radius: 5px; display: flex; flex-direction: column; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .card h4 { margin-top: 0; }
    .card button { margin-top: auto; background: #28a745; color: white; border: none; padding: 0.5rem; border-radius: 3px; }
    .card button:hover { background: #218838; }

    /* Cart */
    .cart { background: #fff; padding: 1rem; margin-top: 2rem; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .cart-item { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #eee; }
    .cart-item:last-child { border-bottom: none; }
    .total-row { display: flex; justify-content: space-between; font-weight: bold; font-size: 1.1rem; padding-top: 1rem; margin-top: 0.5rem; border-top: 2px solid #222; }

    /* Utility */
    .hidden { display: none !important; }
    button { padding: 0.5rem; cursor: pointer; }
  </style>
</head>
<body>

<header>
  <div><strong>My Shop</strong></div>
  <button onclick="logout()">Logout</button>
</header>

<form id="registerForm">
  <h3>Register</h3>
  <input id="rUser" placeholder="Username" required />
  <input id="rPass" type="password" placeholder="Password" required />
  <div class="error" id="rErr"></div>
  <button type="submit" style="width: 100%; background: #007bff; color: white; border: none;">Register</button>
</form>

<form id="loginForm" class="hidden">
  <h3>Login</h3>
  <input id="lUser" placeholder="Username" required />
  <input id="lPass" type="password" placeholder="Password" required />
  <div class="error" id="lErr"></div>
  <button type="submit" style="width: 100%; background: #007bff; color: white; border: none;">Login</button>
</form>

<div id="shop" class="container hidden">
  <h2>Catalog</h2>
  <div class="grid" id="products"></div>

  <div class="cart">
    <h3>Shopping Cart</h3>
    <div id="cart">
      <p style="color: #666; font-style: italic;">Your cart is empty.</p>
    </div>
  </div>
</div>

<script>
  const products = [
    { id: 1, name: "Phone", price: 500 },
    { id: 2, name: "Laptop", price: 1000 },
    { id: 3, name: "Headphones", price: 150 }
  ];

  let cart = [];

  // Grab DOM elements explicitly
  const registerForm = document.getElementById("registerForm");
  const loginForm = document.getElementById("loginForm");
  const shop = document.getElementById("shop");
  const cartContainer = document.getElementById("cart");
  const rUser = document.getElementById("rUser");
  const rPass = document.getElementById("rPass");
  const rErr = document.getElementById("rErr");
  const lUser = document.getElementById("lUser");
  const lPass = document.getElementById("lPass");
  const lErr = document.getElementById("lErr");
  const productsGrid = document.getElementById("products");

  // Registration
  registerForm.onsubmit = e => {
    e.preventDefault();
    if (!rUser.value || !rPass.value) {
      rErr.textContent = "All fields required";
      return;
    }
    localStorage.setItem("user", rUser.value);
    localStorage.setItem("pass", rPass.value);
    registerForm.classList.add("hidden");
    loginForm.classList.remove("hidden");
  };

  // Login
  loginForm.onsubmit = e => {
    e.preventDefault();
    if (lUser.value !== localStorage.getItem("user") || lPass.value !== localStorage.getItem("pass")) {
      lErr.textContent = "Invalid credentials";
      return;
    }
    loginForm.classList.add("hidden");
    shop.classList.remove("hidden");
    loadProducts();
  };

  // Load Products into UI
  function loadProducts() {
    productsGrid.innerHTML = ""; // Clear existing to prevent duplicates
    products.forEach(p => {
      const productsDiv = document.createElement("div");
      productsDiv.className = "card";
      productsDiv.innerHTML = `
        <h4>${p.name}</h4>
        <p>₹${p.price}</p>
        <button onclick="addToCart(${p.id})">Add to Cart</button>
      `;
      productsGrid.appendChild(productsDiv);
    });
  }

  // Add Item to Cart
  function addToCart(id) {
    const product = products.find(p => p.id === id);
    if (product) {
      cart.push(product);
      renderCart();
    }
  }

  // Render Cart UI
  function renderCart() {
    cartContainer.innerHTML = ""; 
    
    if (cart.length === 0) {
      cartContainer.innerHTML = "<p style='color: #666; font-style: italic;'>Your cart is empty.</p>";
      return;
    }

    let total = 0;
    
    cart.forEach(c => {
      total += c.price;
      cartContainer.innerHTML += `
        <div class='cart-item'>
          <span>${c.name}</span>
          <span>₹${c.price}</span>
        </div>`;
    });

    // Display Total
    cartContainer.innerHTML += `
      <div class='total-row'>
        <span>Total:</span>
        <span>₹${total}</span>
      </div>`;
  }

  // Logout
  function logout() {
    // Reloading the page resets the state and shows the registration form again
    location.reload();
  }
</script>
</body>
</html>
